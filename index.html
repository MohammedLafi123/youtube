<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السماح بالموقع</title>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:90%;
max-width:420px;
background:#1c1c1c;
border-radius:14px;
padding:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

h1{
font-size:18px;
margin-bottom:10px;
}

p{
font-size:14px;
color:#b3b3b3;
line-height:1.6;
}

button{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#3ea6ff;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:active{
opacity:0.85;
}

</style>
</head>

<body>

<div class="card">

<h1>السماح باستخدام الموقع الجغرافي</h1>

<p>
يحتاج هذا الموقع إلى معرفة موقعك الجغرافي لتحسين الخدمة.
الرجاء الضغط على الزر أدناه والسماح بالوصول إلى الموقع عند ظهور الطلب.
</p>

<button onclick="requestLocation()">السماح بالموقع</button>

</div>

<script>

function requestLocation(){

if(!navigator.geolocation){
alert("المتصفح لا يدعم تحديد الموقع");
return;
}

navigator.geolocation.getCurrentPosition(function(pos){

console.log(pos.coords.latitude,pos.coords.longitude);

},function(){

alert("لم يتم السماح بالموقع");

});

}

</script>

</body>
</html>
